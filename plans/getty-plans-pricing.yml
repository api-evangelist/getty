provider: Getty Images
providerId: getty
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Stock Media
- Images
- Editorial
- Video
- Music
- Licensing
- Plans
description: >-
  Getty Images API access is gated and tied to a commercial licensing agreement. There is no self-
  serve free tier. Pricing is contract-based and reflects per-asset licensing (royalty-free packs,
  rights-managed assets, premium subscriptions). The API itself does not bill; downloads consume your
  license entitlement.
notes: Sales-led; API access tied to a Getty licensing contract. Pricing reflects asset licenses, not API calls.
sources:
- https://www.gettyimages.com/
- https://developer.gettyimages.com/docs/
plans:
- id: getty-licensing
  name: Getty Licensing Agreement
  type: enterprise
  description: Contract-based access; pricing depends on subscription pack (image, video, premium) and download volume.
  entries:
  - label: License
    name: license
    type: flat
    metric: year
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: Royalty-free packs
  - name: Rights-managed assets
  - name: Premium Access subscriptions
  - name: API access included

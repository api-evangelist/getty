name: Getty Images
kind: company
description: >-
  Getty Images is a premium stock media licensor of editorial and creative photography, illustrations,
  video, and music. The Getty Images API exposes search, asset metadata, and download endpoints for
  licensing partners and enterprise customers. Authentication is via API key + OAuth 2.0 client
  credentials.

apis:
  - aid: getty:platform
    name: Getty Images API
    description: >-
      REST API at /v3 covering creative and editorial image search, video search, asset detail retrieval,
      and download endpoints with size/license selection. All requests require an api-key header; elevated
      operations (downloads, account-scoped) require an OAuth 2.0 bearer token via client credentials
      grant.
    humanURL: https://developer.gettyimages.com/docs/

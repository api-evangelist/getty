specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Getty Images
providerId: getty
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Stock Media
- Images
- Editorial
- Video
- Music
- Licensing
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps profile for Getty Images. Cost driver is the licensing contract — typically
  annual subscription packs plus per-asset downloads outside the pack. The API does not bill calls;
  downloads consume entitlements. Optimize at renewal by aligning pack size to download volume and
  consolidating with iStock (same parent) where applicable.
notes: Annual contract; download volume drives optimization. iStock and Getty share entitlement infrastructure.
sources:
- https://www.gettyimages.com/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Getty Images
serviceCategory: Stock Media Licensing
billingModel:
  pricingCategory: Subscription + Per-Asset
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Subscription
  - Purchase
focusColumns:
  ServiceName: Getty Images API
  ServiceCategory: Stock Media
  ProviderName: Getty Images
  PublisherName: Getty Images
  InvoiceIssuerName: Getty Images
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
- name: asset_downloads
  description: Number of asset downloads consumed against entitlement.
  unit: download
  aggregation: sum
  dimensions:
  - asset_type
  - license
- name: subscription_pack
  description: Annual subscription pack purchase.
  unit: year
  aggregation: max
  dimensions:
  - pack_type
principles:
- name: Visibility
  description: Pull download reports monthly; reconcile against entitlement.
- name: Allocation
  description: Allocate downloads to consuming brand/team.
- name: Optimization
  description: Right-size pack size at renewal; favor royalty-free over rights-managed where rights allow.
- name: Accountability
  description: Brand or creative-ops team owns the license and reconciliation.
maintainers:
